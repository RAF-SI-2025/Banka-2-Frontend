services:
  frontend:
    build: .
    container_name: banka2_frontend
    ports:
      # Default 3000, ali Hyper-V/WinNAT na Windows-u cesto rezervise 2996-3095 range —
      # override-uj sa `FRONTEND_HOST_PORT=3500 docker compose up -d` ako je zauzeto.
      - "${FRONTEND_HOST_PORT:-3000}:80"
    networks:
      - banka2_net

  cypress:
    build:
      context: .
      dockerfile: Dockerfile.cypress
    container_name: banka2_cypress
    depends_on:
      - frontend
    environment:
      - CYPRESS_baseUrl=http://frontend.local:3000
    extra_hosts:
      - "frontend.local:host-gateway"
    working_dir: /e2e
    volumes:
      - ./:/e2e
    networks:
      - banka2_net
    profiles:
      - test

networks:
  banka2_net:
    external: true
    name: banka-2-backend_default
